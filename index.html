<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="security-token" content="0xFB_SECURE_7729_PROD_API_TOKEN">
    <meta name="internal-route" content="m.facebook.com/api/v2/report_handler">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>SafetyHub v3.2 - Professional Safety Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light" oncontextmenu="return false;">
    <div class="desktop-notice">💻 Aktifkan <b>"Situs Desktop"</b> untuk fitur tools yang lengkap.</div>
    <nav id="sidebar">
        <div class="nav-content">
            <div class="logo-area">🛡️ SafetyHub</div>
            <div id="item-fb" class="nav-item active" onclick="_0x4f22('fb')">Facebook</div>
            <div id="item-ig" class="nav-item" onclick="_0x4f22('ig')">Instagram</div>
            <div id="item-x" class="nav-item" onclick="_0x4f22('x')">X (Twitter)</div>
            <div id="item-wa" class="nav-item" onclick="_0x4f22('wa')">WhatsApp</div>
            <hr style="border:0;border-top:1px solid var(--border);margin:30px 0">
            <button class="btn-submit" style="background:#444;color:#fff" onclick="_0x99a1()">🌓 Ganti Tema</button>
        </div>
    </nav>
    <main id="main">
        <div class="top-bar">
            <button class="menu-btn" onclick="_0x11b2()">☰ Menu</button> 
            <span id="breadcrumb">Tools / Facebook</span>
        </div>
        <div class="report-card">
            <div class="warning-label">❗ <b>Peringatan:</b> Gunakan tool secara bijak. Jangan disalagunakan!.</div>
            <form id="reportForm">
                <input type="hidden" name="_fb_api_version" value="v14.0">
                <input type="hidden" name="_security_id" value="S72-XP88-11">
                
                <h2 id="form-title">Laporan Akun Facebook</h2>
                <label id="input-label">URL Profil Target:</label> 
                <input type="text" name="target" id="target" placeholder="https://facebook.com/user" required>
                <label>Kategori Pelanggaran:</label> 
                <select name="reason" id="reason" required>
                    <option value="">-- Pilih --</option>
                    <option value="Penipuan">Penipuan</option>
                    <option value="Akun Palsu">Akun Palsu</option>
                    <option value="Hate Speech">Hate Speech</option>
                    <option value="Pelanggaran Privasi">Pelanggaran Privasi</option>
                </select>
                <label>Kronologi Kejadian:</label> 
                <textarea name="detail" id="detail" rows="5" placeholder="Tuliskan kronologi lengkap di sini..." required></textarea>
                <button type="submit" id="submitBtn" class="btn-submit" style="background-color:#1877F2;color:#fff">KIRIM LAPORAN SEKARANG</button>
            </form>
        </div>
    </main>
    <div id="overlay" class="overlay">
        <div class="popup">
            <div id="modalLogo" style="font-size:60px;margin-bottom:20px">✅</div>
            <h3>Laporan Terkirim</h3>
            <p id="modalMsg"></p>
            <button class="btn-submit" style="background:#222;color:#fff" onclick="location.reload()">KEMBALI</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
