<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafetyHub Pro - Secure Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body data-theme="dark" oncontextmenu="return false;">

    <div class="app-wrapper">
        <header class="main-header">
            <div class="logo-brand">REPORT<span>SMD</span></div>
            
            <nav class="top-nav">
                <button id="item-fb" class="nav-btn active" onclick="switchMode('fb')">Facebook</button>
                <button id="item-ig" class="nav-btn" onclick="switchMode('ig')">Instagram</button>
                <button id="item-x" class="nav-btn" onclick="switchMode('x')">X (Twitter)</button>
                <button id="item-wa" class="nav-btn" onclick="switchMode('wa')">WhatsApp</button>
            </nav>

            <button class="theme-toggle" onclick="toggleTheme()">
                <span class="mode-icon">🌙</span>
            </button>
        </header>

        <main class="content-area">
            <div class="report-container">
                <div class="info-bar">
                    <div id="breadcrumb">TOOLS / FACEBOOK</div>
                    <div class="security-tag">● ENCRYPTED SESSION</div>
                </div>

                <div class="report-card">
                    <h1 id="form-title">Laporan Akun Facebook</h1>
                    <p class="desc">Gunakan formulir ini untuk melaporkan aktivitas mencurigakan atau pelanggaran kebijakan komunitas.</p>

                    <form id="reportForm">
                        <div class="form-grid">
                            <div class="input-group">
                                <label id="input-label">URL Profil Target</label>
                                <input type="text" name="target" id="target" placeholder="https://facebook.com/..." required>
                            </div>
                            
                            <div class="input-group">
                                <label>Kategori Laporan</label>
                                <select name="reason" id="reason" required>
                                    <option value="" disabled selected>Pilih Kategori</option>
                                    <option value="Fraud">Penipuan / Scam</option>
                                    <option value="Fake">Akun Palsu</option>
                                    <option value="Hate">Ujaran Kebencian</option>
                                </select>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Deskripsi Kronologi</label>
                            <textarea name="detail" id="detail" rows="5" placeholder="Ceritakan detail kejadian secara singkat dan jelas..." required></textarea>
                        </div>

                        <button type="submit" id="submitBtn" class="btn-submit">KIRIM LAPORAN KE SERVER</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <div id="overlay" class="overlay">
        <div class="popup">
            <div class="icon-check">✓</div>
            <h3>Data Berhasil Dikirim</h3>
            <p id="modalMsg"></p>
            <button class="btn-close" onclick="location.reload()">Tutup Jendela</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
